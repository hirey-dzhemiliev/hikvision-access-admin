services:
  hikvision-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hikvision-access-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Europe/Simferopol
    volumes:
      - ./data:/data
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/login', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
