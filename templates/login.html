{% extends "base.html" %}
{% block content %}
<section class="card" style="max-width: 460px; margin: 40px auto;">
  <h2 style="margin-top:0;">Вход в админку</h2>
  <p class="muted">Используйте локальную учетную запись из `config.yaml`.</p>
  {% if error %}
  <p class="danger">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="stack" id="login-form">
    <div class="form-row">
      <label>Логин</label>
      <input type="text" name="username" required autocomplete="username">
    </div>
    <div class="form-row">
      <label>Пароль</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <div class="actions">
      <button type="submit">Войти</button>
    </div>
  </form>
</section>
{% endblock %}
